[build]
  publish = "."

[[redirects]]
  from = "/store.html"
  to = "/store.html"
  status = 200

[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/logo-editor.html"
  to = "/logo-editor.html"
  status = 200

[[redirects]]
  from = "/logo-preview.html"
  to = "/logo-preview.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
