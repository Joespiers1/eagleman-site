<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Editor — Gunther Eagleman</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Oswald:wght@700&family=Playfair+Display:wght@700;900&family=Bebas+Neue&family=Montserrat:wght@700;900&family=Cinzel:wght@700;900&family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0A0D12;color:#fff;display:flex;height:100vh;overflow:hidden}
    .sidebar{width:360px;background:#12161E;border-right:1px solid #1E2330;display:flex;flex-direction:column}
    .sidebar-header{padding:16px 20px;border-bottom:1px solid #1E2330;font-size:.85rem;font-weight:800;color:#C9A84C;text-transform:uppercase;letter-spacing:1px}
    .controls{flex:1;overflow-y:auto;padding:16px 20px}
    .s{margin-bottom:20px}
    .s h4{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#556;margin-bottom:10px;padding-top:8px;border-top:1px solid #1E2330}
    .r{margin-bottom:10px}
    .r label{display:block;font-size:.75rem;font-weight:600;color:#8899AA;margin-bottom:3px}
    .r input[type="text"],.r select{width:100%;padding:7px 10px;background:#1A1D27;border:1px solid #2E3340;border-radius:6px;color:#fff;font-size:.85rem;outline:none}
    .r input:focus,.r select:focus{border-color:#C9A84C}
    .r input[type="range"]{width:100%;height:4px;-webkit-appearance:none;background:#2E3340;border-radius:2px;outline:none;margin-top:4px}
    .r input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#C9A84C;cursor:pointer}
    .rv{font-size:.7rem;color:#667;float:right}
    .ci{display:flex;align-items:center;gap:8px}
    .ci input[type="color"]{width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0}
    .ci span{font-size:.75rem;color:#667;font-family:monospace}
    .btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
    .b{padding:5px 10px;border-radius:5px;font-size:.7rem;font-weight:600;border:1px solid #2E3340;background:#1A1D27;color:#aab;cursor:pointer;transition:all .15s}
    .b:hover{border-color:#C9A84C;color:#C9A84C}
    .b.primary{background:#C9A84C;color:#0A1628;border-color:#C9A84C}
    .canvas-area{flex:1;display:flex;flex-direction:column}
    .toolbar{padding:10px 20px;border-bottom:1px solid #1E2330;display:flex;align-items:center;gap:12px;background:#12161E}
    .toolbar select{padding:6px 10px;background:#1A1D27;border:1px solid #2E3340;border-radius:6px;color:#fff;font-size:.8rem;outline:none}
    .toolbar .bgs{display:flex;gap:5px;margin-left:auto}
    .toolbar .bg{width:22px;height:22px;border-radius:4px;border:2px solid #2E3340;cursor:pointer}
    .toolbar .bg:hover,.toolbar .bg.a{border-color:#C9A84C}
    .viewport{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;transition:background .3s;position:relative}
    .viewport svg{max-width:90%;max-height:90%}
    .viewport svg [data-drag]{cursor:move}
    .viewport svg [data-drag]:hover{filter:brightness(1.2)}
    .viewport svg .drag-active{outline:1px dashed rgba(201,168,76,0.6);outline-offset:4px}
    .drag-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:.7rem;color:#556;pointer-events:none;transition:opacity .3s}
    .drag-hint.hidden{opacity:0}
    .ebar{padding:10px 20px;border-top:1px solid #1E2330;display:flex;gap:8px;justify-content:flex-end;background:#12161E}
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">Logo Editor</div>
  <div class="controls">

    <div class="s"><h4>Logo Type</h4>
      <div class="r"><select id="type" onchange="onTypeChange()">
        <optgroup label="Wordmarks">
          <option value="wm">Custom Wordmark</option>
          <option value="wm-v1">V1 — Star + Stacked</option>
          <option value="wm-v2">V2 — Inline Bold</option>
          <option value="wm-v3">V3 — Centered Military</option>
          <option value="wm-v4">V4 — Left Bar + Tagline</option>
          <option value="wm-v5">V5 — Star Divider</option>
        </optgroup>
        <optgroup label="Monograms">
          <option value="m-shield">Shield</option>
          <option value="m-circle">Circle</option>
          <option value="m-square">Rounded Square</option>
          <option value="m-octagon">Octagon</option>
          <option value="m-diamond">Diamond</option>
          <option value="m-seal">Presidential Seal</option>
        </optgroup>
      </select></div>
    </div>

    <div class="s"><h4>Letters</h4>
      <div class="r"><label>Text</label><input type="text" id="letters" value="GE" oninput="draw()"></div>
      <div class="r"><label>Font</label>
        <select id="font" onchange="draw()">
          <option value="Georgia,serif">Georgia</option>
          <option value="'Cinzel',serif">Cinzel</option>
          <option value="'Libre Baskerville',serif">Libre Baskerville</option>
          <option value="'Playfair Display',serif">Playfair Display</option>
          <option value="'Trebuchet MS',sans-serif">Trebuchet MS</option>
          <option value="'Montserrat',sans-serif">Montserrat</option>
          <option value="'Oswald',sans-serif">Oswald</option>
          <option value="'Bebas Neue',sans-serif">Bebas Neue</option>
          <option value="'Inter',sans-serif">Inter</option>
          <option value="'Arial Black',sans-serif">Arial Black</option>
        </select>
      </div>
      <div class="r"><label>Size <span class="rv" id="rv-fs">150</span></label><input type="range" id="fs" min="60" max="280" value="150" oninput="draw();rvU('fs')"></div>
      <div class="r"><label>Letter Spacing <span class="rv" id="rv-ls">4</span></label><input type="range" id="ls" min="-10" max="40" value="4" oninput="draw();rvU('ls')"></div>
      <div class="r"><label>Vertical Offset <span class="rv" id="rv-ty">0</span></label><input type="range" id="ty" min="-80" max="80" value="0" oninput="draw();rvU('ty')"></div>
      <div class="r"><label>Font Weight</label>
        <select id="fw" onchange="draw()"><option value="700" selected>Bold</option><option value="900">Black</option><option value="400">Regular</option></select>
      </div>
      <div class="r"><label>Horizontal Scale <span class="rv" id="rv-hscale">100</span>%</label><input type="range" id="hscale" min="50" max="200" value="100" oninput="draw();rvU('hscale')"></div>
      <div class="r"><label>Vertical Scale <span class="rv" id="rv-vscale">100</span>%</label><input type="range" id="vscale" min="50" max="200" value="100" oninput="draw();rvU('vscale')"></div>
    </div>

    <!-- Wordmark-only controls -->
    <div id="wm-ctrls">
      <div class="s"><h4>Second Line (Wordmark)</h4>
        <div class="r"><label>Text</label><input type="text" id="l2" value="EAGLEMAN" oninput="draw()"></div>
        <div class="r"><label>Size <span class="rv" id="rv-fs2">38</span></label><input type="range" id="fs2" min="16" max="70" value="38" oninput="draw();rvU('fs2')"></div>
        <div class="r"><label>Y Position <span class="rv" id="rv-l2y">105</span></label><input type="range" id="l2y" min="50" max="180" value="105" oninput="draw();rvU('l2y')"></div>
        <div class="r"><label>Spacing <span class="rv" id="rv-ls2">10</span></label><input type="range" id="ls2" min="0" max="24" value="10" oninput="draw();rvU('ls2')"></div>
        <div class="r"><label>Horizontal Scale <span class="rv" id="rv-hscale2">100</span>%</label><input type="range" id="hscale2" min="50" max="200" value="100" oninput="draw();rvU('hscale2')"></div>
        <div class="r"><label>Vertical Scale <span class="rv" id="rv-vscale2">100</span>%</label><input type="range" id="vscale2" min="50" max="200" value="100" oninput="draw();rvU('vscale2')"></div>
      </div>
      <div class="s"><h4>Canvas</h4>
        <div class="r"><label>Width <span class="rv" id="rv-cw">500</span></label><input type="range" id="cw" min="300" max="900" value="500" oninput="draw();rvU('cw')"></div>
        <div class="r"><label>Height <span class="rv" id="rv-ch">120</span></label><input type="range" id="ch" min="60" max="300" value="120" oninput="draw();rvU('ch')"></div>
      </div>
    </div>

    <!-- Monogram-only controls -->
    <div id="mono-ctrls" style="display:none">
      <div class="s"><h4>Shape</h4>
        <div class="r"><label>Size <span class="rv" id="rv-ss">400</span></label><input type="range" id="ss" min="200" max="600" value="400" oninput="draw();rvU('ss')"></div>
        <div class="r"><label>Border Width <span class="rv" id="rv-bw">4</span></label><input type="range" id="bw" min="1" max="12" value="4" oninput="draw();rvU('bw')"></div>
        <div class="r"><label>Corner Radius (square) <span class="rv" id="rv-cr">48</span></label><input type="range" id="cr" min="0" max="100" value="48" oninput="draw();rvU('cr')"></div>
      </div>
    </div>

    <div class="s"><h4>Star</h4>
      <div class="r"><label>Show Star</label><select id="star" onchange="draw()"><option value="1">Yes</option><option value="0">No</option></select></div>
      <div class="r"><label>Star Size <span class="rv" id="rv-starR">12</span></label><input type="range" id="starR" min="4" max="30" value="12" oninput="draw();rvU('starR')"></div>
      <div class="r"><label>Star Y Offset <span class="rv" id="rv-starY">0</span></label><input type="range" id="starY" min="-50" max="50" value="0" oninput="draw();rvU('starY')"></div>
    </div>

    <div class="s"><h4>Colors</h4>
      <div class="r"><label>Letters</label><div class="ci"><input type="color" id="cL" value="#C9A84C" oninput="draw()"><span id="hL">#C9A84C</span></div></div>
      <div class="r"><label>Background</label><div class="ci"><input type="color" id="cBg" value="#0A1628" oninput="draw()"><span id="hBg">#0A1628</span></div></div>
      <div class="r"><label>Border / Lines</label><div class="ci"><input type="color" id="cB" value="#C9A84C" oninput="draw()"><span id="hB">#C9A84C</span></div></div>
      <div class="r"><label>Accent (red bar)</label><div class="ci"><input type="color" id="cA" value="#BF0A30" oninput="draw()"><span id="hA">#BF0A30</span></div></div>
      <div class="r"><label>Star</label><div class="ci"><input type="color" id="cS" value="#C9A84C" oninput="draw()"><span id="hS">#C9A84C</span></div></div>
      <div class="r"><label>Line 1 (Wordmark)</label><div class="ci"><input type="color" id="cL1" value="#FFFFFF" oninput="draw()"><span id="hL1">#FFFFFF</span></div></div>
      <div class="btns">
        <button class="b" onclick="preset('patriot')">Patriot</button>
        <button class="b" onclick="preset('gold')">All Gold</button>
        <button class="b" onclick="preset('bw')">B&amp;W</button>
        <button class="b" onclick="preset('redwhite')">Red/White</button>
      </div>
    </div>

    <div class="s"><h4>Decorations (Wordmark)</h4>
      <div class="r"><label>Top Line</label><select id="dTop" onchange="draw()"><option value="1">Show</option><option value="0">Hide</option></select></div>
      <div class="r"><label>Bottom Line</label><select id="dBot" onchange="draw()"><option value="1">Show</option><option value="0">Hide</option></select></div>
      <div class="r"><label>Left Bar</label><select id="dLeft" onchange="draw()"><option value="0">Hide</option><option value="1">Show</option></select></div>
      <div class="r"><label>Separator</label><select id="dSep" onchange="draw()"><option value="0">Hide</option><option value="1">Show</option></select></div>
      <div class="r"><label>Tagline</label><input type="text" id="tag" value="" placeholder="AMERICA FIRST" oninput="draw()"></div>
      <div class="r"><label>Tagline Size <span class="rv" id="rv-tagFs">10</span></label><input type="range" id="tagFs" min="6" max="30" value="10" oninput="draw();rvU('tagFs')"></div>
      <div class="r"><label>Tagline Spacing <span class="rv" id="rv-tagLs">4</span></label><input type="range" id="tagLs" min="0" max="16" value="4" oninput="draw();rvU('tagLs')"></div>
      <div class="r"><label>Tagline Y Position <span class="rv" id="rv-tagY">0</span></label><input type="range" id="tagY" min="-30" max="30" value="0" oninput="draw();rvU('tagY')"></div>
    </div>

    <div class="s"><h4>Filters</h4>
      <div class="r"><label>Drop Shadow</label><select id="fSh" onchange="applyF()"><option value="0">Off</option><option value="1">Light</option><option value="2">Medium</option><option value="3">Heavy</option></select></div>
      <div class="r"><label>Glow</label><select id="fGl" onchange="applyF()"><option value="0">Off</option><option value="gold">Gold</option><option value="red">Red</option><option value="white">White</option></select></div>
    </div>

  </div>
</div>

<div class="canvas-area">
  <div class="toolbar">
    <button class="b" onclick="resetPositions()" style="font-size:.7rem">Reset Positions</button>
    <div class="bgs">
      <div class="bg a" style="background:#0A1628" onclick="setBg('#0A1628',this)"></div>
      <div class="bg" style="background:#fff" onclick="setBg('#fff',this)"></div>
      <div class="bg" style="background:#BF0A30" onclick="setBg('#BF0A30',this)"></div>
      <div class="bg" style="background:#374151" onclick="setBg('#374151',this)"></div>
      <div class="bg" style="background:#000" onclick="setBg('#000',this)"></div>
    </div>
  </div>
  <div class="viewport" id="vp" style="background:#0A1628">
    <span class="drag-hint" id="dragHint">Click and drag elements to reposition them</span>
  </div>
  <div class="ebar">
    <button class="b" onclick="dlSVG()">Download SVG</button>
    <button class="b primary" onclick="dlPNG()">Download PNG</button>
  </div>
</div>

<script>
var vp=document.getElementById('vp');
function g(id){var e=document.getElementById(id);return e?(e.type==='range'?+e.value:e.value):'';}
function rvU(id){var e=document.getElementById('rv-'+id),i=document.getElementById(id);if(e&&i)e.textContent=i.value;}
function hU(){['L','Bg','B','A','S','L1'].forEach(function(k){var e=document.getElementById('h'+k),i=document.getElementById('c'+k);if(e&&i)e.textContent=i.value.toUpperCase();});}

function setBg(c,btn){vp.style.background=c;document.querySelectorAll('.bg').forEach(function(b){b.classList.remove('a');});btn.classList.add('a');}

function star(cx,cy,r,fill){var p=[];for(var i=0;i<5;i++){var ao=(i*72-90)*Math.PI/180,ai=((i*72)+36-90)*Math.PI/180;p.push((cx+r*Math.cos(ao)).toFixed(1)+','+(cy+r*Math.sin(ao)).toFixed(1));p.push((cx+r*.4*Math.cos(ai)).toFixed(1)+','+(cy+r*.4*Math.sin(ai)).toFixed(1));}return '<polygon points="'+p.join(' ')+'" fill="'+fill+'"/>';}

var wmPresets = {
  'wm':    {letters:'GUNTHER',l2:'EAGLEMAN',fs:38,ls:10,fs2:38,ls2:10,l2y:105,cw:500,ch:120,ty:0,dTop:'1',dBot:'1',dLeft:'0',dSep:'0',star:'1',starR:12,starY:0,tag:''},
  'wm-v1': {letters:'GUNTHER',l2:'EAGLEMAN',fs:36,ls:4,fs2:36,ls2:4,l2y:82,cw:520,ch:100,ty:0,dTop:'0',dBot:'0',dLeft:'0',dSep:'1',star:'0',starR:10,starY:0,tag:''},
  'wm-v2': {letters:'GUNTHER',l2:'EAGLEMAN',fs:38,ls:3,fs2:38,ls2:3,l2y:36,cw:660,ch:55,ty:0,dTop:'0',dBot:'0',dLeft:'0',dSep:'0',star:'0',starR:8,starY:0,tag:''},
  'wm-v3': {letters:'GUNTHER',l2:'EAGLEMAN',fs:38,ls:10,fs2:38,ls2:10,l2y:106,cw:480,ch:120,ty:0,dTop:'1',dBot:'1',dLeft:'0',dSep:'0',star:'1',starR:12,starY:0,tag:''},
  'wm-v4': {letters:'GUNTHER',l2:'EAGLEMAN',fs:38,ls:5,fs2:38,ls2:5,l2y:84,cw:500,ch:110,ty:0,dTop:'0',dBot:'0',dLeft:'1',dSep:'1',star:'0',starR:10,starY:0,tag:'AMERICA FIRST'},
  'wm-v5': {letters:'GUNTHER',l2:'EAGLEMAN',fs:36,ls:8,fs2:32,ls2:10,l2y:82,cw:500,ch:100,ty:0,dTop:'0',dBot:'0',dLeft:'0',dSep:'0',star:'1',starR:10,starY:0,tag:''}
};

function onTypeChange(){
  dragOffsets={}; // reset drag positions on type change
  var t=g('type'),isMono=t.indexOf('m-')===0;
  document.getElementById('wm-ctrls').style.display=isMono?'none':'block';
  document.getElementById('mono-ctrls').style.display=isMono?'block':'none';
  if(isMono){
    document.getElementById('letters').value='GE';
    document.getElementById('fs').value=150;rvU('fs');
    document.getElementById('ls').value=4;rvU('ls');
    document.getElementById('ty').value=0;rvU('ty');
    document.getElementById('font').value="Georgia,serif";
  }else{
    // Load wordmark preset
    var p = wmPresets[t] || wmPresets['wm'];
    document.getElementById('letters').value=p.letters;
    document.getElementById('l2').value=p.l2;
    document.getElementById('fs').value=p.fs;rvU('fs');
    document.getElementById('ls').value=p.ls;rvU('ls');
    document.getElementById('fs2').value=p.fs2;rvU('fs2');
    document.getElementById('ls2').value=p.ls2;rvU('ls2');
    document.getElementById('l2y').value=p.l2y;rvU('l2y');
    document.getElementById('cw').value=p.cw;rvU('cw');
    document.getElementById('ch').value=p.ch;rvU('ch');
    document.getElementById('ty').value=p.ty;rvU('ty');
    document.getElementById('dTop').value=p.dTop;
    document.getElementById('dBot').value=p.dBot;
    document.getElementById('dLeft').value=p.dLeft;
    document.getElementById('dSep').value=p.dSep;
    document.getElementById('star').value=p.star;
    document.getElementById('starR').value=p.starR;rvU('starR');
    document.getElementById('starY').value=p.starY;rvU('starY');
    document.getElementById('tag').value=p.tag;
    document.getElementById('font').value="'Trebuchet MS',sans-serif";
  }
  draw();
}

function preset(n){
  var p={
    patriot:{cL:'#C9A84C',cBg:'#0A1628',cB:'#C9A84C',cA:'#BF0A30',cS:'#C9A84C',cL1:'#FFFFFF'},
    gold:{cL:'#D4AF37',cBg:'#0A1628',cB:'#D4AF37',cA:'#B89530',cS:'#D4AF37',cL1:'#D4AF37'},
    bw:{cL:'#FFFFFF',cBg:'#111111',cB:'#CCCCCC',cA:'#888888',cS:'#FFFFFF',cL1:'#FFFFFF'},
    redwhite:{cL:'#FFFFFF',cBg:'#0A1628',cB:'#BF0A30',cA:'#BF0A30',cS:'#FFFFFF',cL1:'#FFFFFF'}
  };
  var c=p[n];if(!c)return;
  Object.keys(c).forEach(function(k){document.getElementById(k).value=c[k];});
  hU();draw();
}

function draw(){
  hU();
  var t=g('type');
  if(t.indexOf('wm')===0) drawWM(); else drawMono(t);
}

// Generate text with scale transform
function scaledText(x,y,anchor,font,fw,fs,fill,ls,text,hscale,vscale){
  var sx=(hscale||100)/100, sy=(vscale||100)/100;
  var tx=anchor==='middle'?x:x;
  // To scale around the text's anchor point, translate to origin, scale, translate back
  var transform='translate('+tx+','+y+') scale('+sx+','+sy+') translate(-'+tx+',-'+y+')';
  return '<text x="'+x+'" y="'+y+'" text-anchor="'+(anchor||'start')+'" font-family="'+font+'" font-weight="'+fw+'" font-size="'+fs+'" fill="'+fill+'" letter-spacing="'+ls+'" transform="'+transform+'">'+text+'</text>';
}

function drawWM(){
  var W=g('cw'),H=g('ch'),cx=W/2;
  var t=g('type');
  var s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'">';
  var cL1=g('cL1'),cL2=g('cL'),cA=g('cA'),cB=g('cB'),cS=g('cS');
  s+='<defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="'+cL2+'"/><stop offset="100%" stop-color="'+cL2+'" stop-opacity="0.8"/></linearGradient></defs>';

  // V2 is a special inline layout
  if(t==='wm-v2'){
    var midY=H*0.72;
    s+=dWrap('line1',scaledText(10,midY,'start',g('font'),g('fw'),g('fs'),cL1,g('ls'),g('letters'),g('hscale'),g('vscale')));
    s+=dWrap('diamond','<rect x="'+(W*0.44)+'" y="'+(midY-g('fs')*0.45)+'" width="'+(g('fs')*0.22)+'" height="'+(g('fs')*0.22)+'" fill="'+cA+'" transform="rotate(45,'+(W*0.44+g('fs')*0.11)+','+(midY-g('fs')*0.34)+')"/>');
    s+=dWrap('line2',scaledText(W*0.49,midY,'start',g('font'),g('fw'),g('fs2'),'url(#lg)',g('ls2'),g('l2'),g('hscale2'),g('vscale2')));
    s+=dWrap('underline','<rect x="0" y="'+(H-6)+'" width="'+W+'" height="1.5" fill="'+cB+'" opacity="0.3"/>');
    s+='</svg>';
    vp.innerHTML=s+'<span class="drag-hint">Drag elements to reposition</span>';applyF();return;
  }

  // V1 star icon variant
  if(t==='wm-v1'){
    var l1y=42+g('ty');
    s+=dWrap('v1star',star(22,l1y-14,14,cS));
    s+=dWrap('line1',scaledText(52,l1y,'start',g('font'),g('fw'),g('fs'),cL1,g('ls'),g('letters'),g('hscale'),g('vscale')));
    s+=dWrap('sepline','<rect x="52" y="'+(l1y+7)+'" width="200" height="2" fill="'+cA+'"/>');
    s+=dWrap('line2',scaledText(52,g('l2y'),'start',g('font'),g('fw'),g('fs2'),'url(#lg)',g('ls2'),g('l2'),g('hscale2'),g('vscale2')));
    s+='</svg>';
    vp.innerHTML=s+'<span class="drag-hint">Drag elements to reposition</span>';applyF();return;
  }

  // Standard stacked layout (V3, V4, V5, custom)
  if(g('dLeft')==='1') s+=dWrap('leftbar','<rect x="0" y="0" width="5" height="'+H+'" fill="'+cA+'"/>');
  if(g('dTop')==='1') s+=dWrap('topline','<rect x="40" y="6" width="'+(W-80)+'" height="3" fill="'+cA+'"/>');

  var l1y=50+g('ty');
  var offsetX = g('dLeft')==='1' ? 15 : 0;
  s+=dWrap('line1',scaledText(cx+offsetX,l1y,'middle',g('font'),g('fw'),g('fs'),cL1,g('ls'),g('letters'),g('hscale'),g('vscale')));

  // Stars between lines
  var numStars = g('star')==='1' ? 3 : 0;
  if(t==='wm-v5') numStars = g('star')==='1' ? 1 : 0;
  if(numStars > 0){
    var sy=(l1y+g('l2y'))/2+g('starY');
    var starContent='';
    if(numStars===1){
      starContent+=star(cx+offsetX,sy,g('starR'),cS);
      if(t==='wm-v5'){
        starContent+='<rect x="'+(cx+offsetX-120)+'" y="'+(sy-1)+'" width="'+(120-g('starR')-8)+'" height="2" fill="'+cA+'"/>';
        starContent+='<rect x="'+(cx+offsetX+g('starR')+8)+'" y="'+(sy-1)+'" width="'+(120-g('starR')-8)+'" height="2" fill="'+cA+'"/>';
      }
    } else {
      var gap=30;
      var startX=cx+offsetX-((numStars-1)*gap)/2;
      for(var i=0;i<numStars;i++) starContent+=star(startX+i*gap,sy,g('starR'),cS);
    }
    s+=dWrap('stars',starContent);
  }

  // Separator
  if(g('dSep')==='1'){var sepY=(l1y+g('l2y'))/2;s+=dWrap('sepline','<rect x="'+(g('dLeft')==='1'?22:40)+'" y="'+sepY+'" width="140" height="1.5" fill="'+cB+'" opacity="0.4"/>');}

  // Line 2
  s+=dWrap('line2',scaledText(cx+offsetX,g('l2y'),'middle',g('font'),g('fw'),g('fs2'),'url(#lg)',g('ls2'),g('l2'),g('hscale2'),g('vscale2')));

  if(g('dBot')==='1') s+=dWrap('botline','<rect x="40" y="'+(H-8)+'" width="'+(W-80)+'" height="3" fill="'+cA+'"/>');

  var tg=g('tag');
  if(tg) s+=dWrap('tagline','<text x="'+(cx+offsetX)+'" y="'+(H-2+g('tagY'))+'" text-anchor="middle" font-family="\'Trebuchet MS\',sans-serif" font-weight="700" font-size="'+g('tagFs')+'" fill="'+cA+'" letter-spacing="'+g('tagLs')+'">'+tg+'</text>');

  s+='</svg>';
  vp.innerHTML=s+'<span class="drag-hint">Drag elements to reposition</span>';
  applyF();
}

function drawMono(type){
  var S=g('ss'),cx=S/2,cy=S/2;
  var cL=g('cL'),cBg=g('cBg'),cB=g('cB'),cA=g('cA'),cS=g('cS');
  var bw=g('bw'),cr=g('cr');
  var font=g('font'),fs=g('fs'),ls=g('ls'),fw=g('fw');
  var textY=cy+fs*0.33+g('ty');
  var letters=g('letters');
  var showStar=g('star')==='1';
  var starR=g('starR');

  var s='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+S+' '+S+'" width="'+S+'" height="'+S+'">';
  s+='<defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="'+cL+'"/><stop offset="100%" stop-color="'+cL+'" stop-opacity="0.85"/></linearGradient></defs>';

  var m=S*0.05; // margin
  var inner=S-m*2;

  if(type==='m-shield'){
    var t=m,b=S-m,l=m+10,r=S-m-10;
    s+='<path d="M'+cx+','+t+' L'+r+','+(t+inner*0.17)+' L'+r+','+(cy+inner*0.1)+' C'+r+','+(b-inner*0.12)+' '+(cx+inner*0.2)+','+(b-inner*0.05)+' '+cx+','+b+' C'+(cx-inner*0.2)+','+(b-inner*0.05)+' '+l+','+(b-inner*0.12)+' '+l+','+(cy+inner*0.1)+' L'+l+','+(t+inner*0.17)+' Z" fill="'+cBg+'" stroke="'+cB+'" stroke-width="'+bw+'"/>';
    // Red top
    var rt=t+inner*0.17;
    s+='<path d="M'+cx+','+t+' L'+r+','+rt+' L'+r+','+(rt+12)+' L'+cx+','+(t+14)+' L'+l+','+(rt+12)+' L'+l+','+rt+' Z" fill="'+cA+'"/>';
    if(showStar) s+=star(cx,rt+30+g('starY'),starR,cS);
    textY=cy+fs*0.25+inner*0.08+g('ty');
  }
  else if(type==='m-circle'){
    var rad=inner/2;
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+rad+'" fill="'+cBg+'" stroke="'+cB+'" stroke-width="'+bw+'"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(rad-16)+'" fill="none" stroke="'+cB+'" stroke-width="1" opacity="0.15"/>';
    // Red arc
    var arcY=cy-rad+20;
    s+='<path d="M'+(cx-rad*0.75)+','+arcY+' A'+rad+','+rad+' 0 0,1 '+(cx+rad*0.75)+','+arcY+'" fill="none" stroke="'+cA+'" stroke-width="5" stroke-linecap="round"/>';
    if(showStar) s+=star(cx,arcY+20+g('starY'),starR,cS);
  }
  else if(type==='m-square'){
    s+='<rect x="'+m+'" y="'+m+'" width="'+inner+'" height="'+inner+'" rx="'+cr+'" fill="'+cBg+'" stroke="'+cB+'" stroke-width="'+bw+'"/>';
    s+='<rect x="'+m+'" y="'+m+'" width="'+inner+'" height="6" rx="3" fill="'+cA+'"/>';
    if(showStar) s+=star(cx,m+40+g('starY'),starR,cS);
  }
  else if(type==='m-octagon'){
    var c1=m+inner*0.25,c2=m+inner*0.75;
    s+='<polygon points="'+c1+','+m+' '+c2+','+m+' '+(m+inner)+','+c1+' '+(m+inner)+','+c2+' '+c2+','+(m+inner)+' '+c1+','+(m+inner)+' '+m+','+c2+' '+m+','+c1+'" fill="'+cBg+'" stroke="'+cB+'" stroke-width="'+bw+'"/>';
    // Red top edge
    s+='<polygon points="'+c1+','+m+' '+c2+','+m+' '+(m+inner)+','+c1+' '+(m+inner)+','+(c1-10)+' '+c2+','+(m-8)+' '+c1+','+(m-8)+' '+m+','+(c1-10)+' '+m+','+c1+'" fill="'+cA+'"/>';
    if(showStar) s+=star(cx,m+inner*0.12+g('starY'),starR,'#FFFFFF');
  }
  else if(type==='m-diamond'){
    var half=inner*0.5;
    s+='<g transform="translate('+cx+','+cy+') rotate(45)"><rect x="-'+half+'" y="-'+half+'" width="'+(half*2)+'" height="'+(half*2)+'" rx="10" fill="'+cBg+'" stroke="'+cB+'" stroke-width="'+bw+'"/>';
    s+='<rect x="-'+half+'" y="-'+half+'" width="'+(half*2)+'" height="6" fill="'+cA+'"/></g>';
    if(showStar){s+=star(cx,m-2+g('starY'),starR,cS);s+=star(cx,S-m+2-g('starY'),starR*.7,cA);}
  }
  else if(type==='m-seal'){
    var rad2=inner/2;
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+rad2+'" fill="'+cBg+'" stroke="'+cB+'" stroke-width="5"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(rad2-12)+'" fill="none" stroke="'+cB+'" stroke-width="2"/>';
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(rad2-50)+'" fill="none" stroke="'+cB+'" stroke-width="1" opacity="0.1"/>';
    // 5 stars around
    for(var i=0;i<5;i++){
      var a=(i*40-100)*Math.PI/180;
      s+=star(cx+(rad2-20)*Math.cos(a),cy+(rad2-20)*Math.sin(a),6,cS);
    }
    // Curved text
    s+='<path id="tc" d="M'+(cx-rad2+45)+','+cy+' A'+(rad2-45)+','+(rad2-45)+' 0 0,1 '+(cx+rad2-45)+','+cy+'" fill="none"/>';
    s+='<text font-family="\'Trebuchet MS\',sans-serif" font-weight="700" font-size="12" fill="#fff" letter-spacing="3"><textPath href="#tc" startOffset="50%" text-anchor="middle">GUNTHER EAGLEMAN</textPath></text>';
    s+='<path id="bc" d="M'+(cx-rad2+55)+','+(cy+60)+' A'+(rad2-55)+','+(rad2-55)+' 0 0,0 '+(cx+rad2-55)+','+(cy+60)+'" fill="none"/>';
    s+='<text font-family="\'Trebuchet MS\',sans-serif" font-weight="700" font-size="11" fill="'+cA+'" letter-spacing="4"><textPath href="#bc" startOffset="50%" text-anchor="middle">AMERICA FIRST</textPath></text>';
    // Red accent lines
    s+='<line x1="'+(cx-60)+'" y1="'+(cy+45)+'" x2="'+(cx-20)+'" y2="'+(cy+45)+'" stroke="'+cA+'" stroke-width="2" stroke-linecap="round"/>';
    s+='<line x1="'+(cx+20)+'" y1="'+(cy+45)+'" x2="'+(cx+60)+'" y2="'+(cy+45)+'" stroke="'+cA+'" stroke-width="2" stroke-linecap="round"/>';
    if(showStar) s+=star(cx,m+15+g('starY'),starR,cS);
  }

  // Letters
  s+=dWrap('letters',scaledText(cx,textY,'middle',font,fw,fs,'url(#lg)',ls,letters,g('hscale'),g('vscale')));

  s+='</svg>';
  vp.innerHTML=s+'<span class="drag-hint">Drag elements to reposition</span>';
  applyF();
}

function applyF(){
  var svg=vp.querySelector('svg');if(!svg)return;
  var f=[];
  var sh=g('fSh');if(sh>0) f.push('drop-shadow(0 '+(sh*2)+'px '+(sh*4)+'px rgba(0,0,0,0.'+(sh*2)+'))');
  var gl=g('fGl');
  if(gl==='gold') f.push('drop-shadow(0 0 10px rgba(201,168,76,0.5))');
  if(gl==='red') f.push('drop-shadow(0 0 10px rgba(191,10,48,0.5))');
  if(gl==='white') f.push('drop-shadow(0 0 10px rgba(255,255,255,0.3))');
  svg.style.filter=f.length?f.join(' '):'none';
}

function dlSVG(){var s=vp.querySelector('svg');if(!s)return;var b=new Blob([s.outerHTML],{type:'image/svg+xml'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ge-logo.svg';a.click();}
function dlPNG(){var s=vp.querySelector('svg');if(!s)return;var d=new XMLSerializer().serializeToString(s);var img=new Image();var blob=new Blob([d],{type:'image/svg+xml;charset=utf-8'});var u=URL.createObjectURL(blob);img.onload=function(){var c=document.createElement('canvas');c.width=img.width*3;c.height=img.height*3;var ctx=c.getContext('2d');ctx.scale(3,3);ctx.drawImage(img,0,0);URL.revokeObjectURL(u);var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='ge-logo.png';a.click();};img.src=u;}

/* ═══ DRAG & DROP ENGINE ═══ */
var dragEl=null, dragStartX=0, dragStartY=0, origTX=0, origTY=0;
var dragOffsets={}; // persistent offsets per element key

function initDrag(){
  var svg=vp.querySelector('svg');
  if(!svg) return;
  svg.querySelectorAll('[data-drag]').forEach(function(el){
    el.addEventListener('mousedown',startDrag);
    el.addEventListener('touchstart',startDragTouch,{passive:false});
  });
  document.getElementById('dragHint').classList.remove('hidden');
}

function getSVGPoint(svg,clientX,clientY){
  var pt=svg.createSVGPoint();
  pt.x=clientX; pt.y=clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

function startDrag(e){
  e.preventDefault();
  dragEl=e.currentTarget;
  dragEl.classList.add('drag-active');
  var svg=dragEl.ownerSVGElement;
  var pt=getSVGPoint(svg,e.clientX,e.clientY);
  dragStartX=pt.x; dragStartY=pt.y;
  var key=dragEl.dataset.drag;
  if(!dragOffsets[key]) dragOffsets[key]={x:0,y:0};
  origTX=dragOffsets[key].x; origTY=dragOffsets[key].y;
  document.addEventListener('mousemove',onDrag);
  document.addEventListener('mouseup',endDrag);
}

function startDragTouch(e){
  e.preventDefault();
  var touch=e.touches[0];
  dragEl=e.currentTarget;
  dragEl.classList.add('drag-active');
  var svg=dragEl.ownerSVGElement;
  var pt=getSVGPoint(svg,touch.clientX,touch.clientY);
  dragStartX=pt.x; dragStartY=pt.y;
  var key=dragEl.dataset.drag;
  if(!dragOffsets[key]) dragOffsets[key]={x:0,y:0};
  origTX=dragOffsets[key].x; origTY=dragOffsets[key].y;
  document.addEventListener('touchmove',onDragTouch,{passive:false});
  document.addEventListener('touchend',endDrag);
}

function onDrag(e){
  if(!dragEl) return;
  var svg=dragEl.ownerSVGElement;
  var pt=getSVGPoint(svg,e.clientX,e.clientY);
  var dx=pt.x-dragStartX, dy=pt.y-dragStartY;
  var key=dragEl.dataset.drag;
  dragOffsets[key]={x:origTX+dx, y:origTY+dy};
  dragEl.setAttribute('transform','translate('+dragOffsets[key].x+','+dragOffsets[key].y+')');
}

function onDragTouch(e){
  e.preventDefault();
  if(!dragEl) return;
  var touch=e.touches[0];
  var svg=dragEl.ownerSVGElement;
  var pt=getSVGPoint(svg,touch.clientX,touch.clientY);
  var dx=pt.x-dragStartX, dy=pt.y-dragStartY;
  var key=dragEl.dataset.drag;
  dragOffsets[key]={x:origTX+dx, y:origTY+dy};
  dragEl.setAttribute('transform','translate('+dragOffsets[key].x+','+dragOffsets[key].y+')');
}

function endDrag(){
  if(dragEl) dragEl.classList.remove('drag-active');
  dragEl=null;
  document.removeEventListener('mousemove',onDrag);
  document.removeEventListener('mouseup',endDrag);
  document.removeEventListener('touchmove',onDragTouch);
  document.removeEventListener('touchend',endDrag);
}

// Wrap element in draggable group
function dWrap(key,content){
  var off=dragOffsets[key]||{x:0,y:0};
  return '<g data-drag="'+key+'" transform="translate('+off.x+','+off.y+')" style="cursor:move">'+content+'</g>';
}

// Override draw to call initDrag after render
var _origDraw=draw;
draw=function(){_origDraw();setTimeout(initDrag,10);};

// Reset positions button
function resetPositions(){
  dragOffsets={};
  draw();
}

// Init
onTypeChange();
