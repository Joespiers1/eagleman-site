<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B8952F"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#A8862A"/>
    </linearGradient>
  </defs>

  <!-- Star icon -->
  <g transform="translate(32, 60)">
    <polygon points="0,-28 6.5,-9 27,-9 10.5,4 17,23 0,12 -17,23 -10.5,4 -27,-9 -6.5,-9" fill="url(#starGrad)"/>
    <polygon points="0,-22 5,-7 21,-7 8,3 13,18 0,9.5 -13,18 -8,3 -21,-7 -5,-7" fill="none" stroke="#0A1628" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- GUNTHER text -->
  <text x="72" y="52" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="42" fill="#FFFFFF" letter-spacing="6" text-rendering="geometricPrecision">GUNTHER</text>

  <!-- EAGLEMAN text -->
  <text x="72" y="98" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="42" fill="url(#goldGrad)" letter-spacing="6" text-rendering="geometricPrecision">EAGLEMAN</text>

  <!-- Accent line under GUNTHER -->
  <rect x="72" y="58" width="260" height="3" fill="#BF0A30" rx="1.5"/>

  <!-- TM mark -->
  <text x="530" y="38" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#C9A84C" opacity="0.7">TM</text>
</svg>
