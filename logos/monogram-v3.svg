  <!-- Red top bar -->
  <polygon points="80,20 432,20 492,80 492,60 432,4 80,4 20,60 20,80" fill="#BF0A30" opacity="0.8"/>
  <!-- G letter - custom block style -->
  <text x="138" y="340" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-size="220" fill="url(#g3)">G</text>
  <!-- E letter -->
  <text x="295" y="340" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-size="220" fill="url(#g3)">E</text>
  <!-- Horizontal red line through middle -->
  <rect x="60" y="250" width="392" height="4" fill="#BF0A30" opacity="0.5"/>
  <!-- Top star -->
