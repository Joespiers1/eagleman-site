<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B89530"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="190" fill="#0A1628" stroke="url(#mg5)" stroke-width="5"/>
  <!-- Second ring -->
  <circle cx="200" cy="200" r="178" fill="none" stroke="url(#mg5)" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>
  <!-- 5 stars around top -->
  <g fill="url(#mg5)">
    <polygon points="200,22 202,28 209,28 204,32 206,38 200,34 194,38 196,32 191,28 198,28"/>
    <polygon points="120,50 122,56 129,56 124,60 126,66 120,62 114,66 116,60 111,56 118,56"/>
    <polygon points="280,50 282,56 289,56 284,60 286,66 280,62 274,66 276,60 271,56 278,56"/>
    <polygon points="68,102 70,108 77,108 72,112 74,118 68,114 62,118 64,112 59,108 66,108"/>
    <polygon points="332,102 334,108 341,108 336,112 338,118 332,114 326,118 328,112 323,108 330,108"/>
  </g>
  <!-- GE centered -->
  <text x="200" y="245" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="140" fill="url(#mg5)" letter-spacing="2">GE</text>
  <!-- GUNTHER EAGLEMAN curved top -->
  <path id="topC5" d="M60,200 A140,140 0 0,1 340,200" fill="none"/>
  <text font-family="'Trebuchet MS',Arial,sans-serif" font-weight="700" font-size="13" fill="#FFFFFF" letter-spacing="3">
    <textPath href="#topC5" startOffset="50%" text-anchor="middle">GUNTHER EAGLEMAN</textPath>
  </text>
  <!-- AMERICA FIRST curved bottom -->
  <path id="botC5" d="M75,320 A150,150 0 0,0 325,320" fill="none"/>
  <text font-family="'Trebuchet MS',Arial,sans-serif" font-weight="700" font-size="12" fill="#BF0A30" letter-spacing="4">
    <textPath href="#botC5" startOffset="50%" text-anchor="middle">AMERICA FIRST</textPath>
  </text>
  <!-- Red line accents -->
  <line x1="95" y1="290" x2="160" y2="290" stroke="#BF0A30" stroke-width="2" stroke-linecap="round"/>
  <line x1="240" y1="290" x2="305" y2="290" stroke="#BF0A30" stroke-width="2" stroke-linecap="round"/>
</svg>
