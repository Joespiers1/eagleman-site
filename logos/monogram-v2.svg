<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B89530"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="190" fill="#0A1628" stroke="url(#mg2)" stroke-width="4"/>
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="172" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.2"/>
  <!-- Red arc at top -->
  <path d="M70,85 A190,190 0 0,1 330,85" fill="none" stroke="#BF0A30" stroke-width="6" stroke-linecap="round"/>
  <!-- Star -->
  <polygon points="200,60 203,69 213,69 205,75 208,84 200,78 192,84 195,75 187,69 197,69" fill="url(#mg2)"/>
  <!-- GE centered -->
  <text x="200" y="248" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="150" fill="url(#mg2)" letter-spacing="2">GE</text>
  <!-- AMERICA FIRST curved -->
  <path id="arc2" d="M80,330 A160,160 0 0,0 320,330" fill="none"/>
  <text font-family="'Trebuchet MS',Arial,sans-serif" font-weight="700" font-size="14" fill="#BF0A30" letter-spacing="5">
    <textPath href="#arc2" startOffset="50%" text-anchor="middle">AMERICA FIRST</textPath>
  </text>
</svg>
