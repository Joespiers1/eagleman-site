<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 100" width="700" height="100">
  <defs>
    <linearGradient id="gld2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8952F"/>
    </linearGradient>
  </defs>
  <!-- Single line: GUNTHER EAGLEMAN with red dot separator -->
  <text x="0" y="65" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="56" fill="#FFFFFF" letter-spacing="5">GUNTHER</text>
  <!-- Red diamond separator -->
  <rect x="358" y="32" width="14" height="14" fill="#BF0A30" transform="rotate(45, 365, 39)"/>
  <!-- EAGLEMAN in gold -->
  <text x="390" y="65" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="56" fill="url(#gld2)" letter-spacing="5">EAGLEMAN</text>
  <!-- Thin gold line underneath -->
  <rect x="0" y="78" width="700" height="2" fill="#C9A84C" opacity="0.4"/>
</svg>
