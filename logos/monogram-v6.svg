<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B89530"/>
    </linearGradient>
  </defs>
  <!-- Diamond (rotated square) -->
  <g transform="translate(200,200) rotate(45)">
    <rect x="-140" y="-140" width="280" height="280" rx="12" fill="#0A1628" stroke="url(#mg6)" stroke-width="4"/>
    <!-- Red top edge of diamond -->
    <rect x="-140" y="-140" width="280" height="6" fill="#BF0A30"/>
  </g>
  <!-- GE centered (not rotated) -->
  <text x="200" y="240" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-weight="700" font-size="130" fill="url(#mg6)" letter-spacing="2">GE</text>
  <!-- Star at very top point -->
  <polygon points="200,10 203,19 212,19 205,24 207,33 200,28 193,33 195,24 188,19 197,19" fill="url(#mg6)"/>
  <!-- Star at very bottom point -->
  <polygon points="200,374 202,380 209,380 204,384 206,390 200,386 194,390 196,384 191,380 198,380" fill="#BF0A30"/>
