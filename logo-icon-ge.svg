<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B8952F"/>
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D41030"/>
      <stop offset="100%" stop-color="#9A0822"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background shield shape -->
  <path d="M256,20 L466,100 L466,280 C466,380 370,460 256,496 C142,460 46,380 46,280 L46,100 Z" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Gold border on shield -->
  <path d="M256,20 L466,100 L466,280 C466,380 370,460 256,496 C142,460 46,380 46,280 L46,100 Z" fill="none" stroke="url(#goldG)" stroke-width="5"/>

  <!-- Inner shield highlight -->
  <path d="M256,40 L446,112 L446,278 C446,370 356,444 256,478 C156,444 66,370 66,278 L66,112 Z" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.15"/>

  <!-- Red accent bar at top of shield -->
  <path d="M256,20 L466,100 L466,115 L256,38 L46,115 L46,100 Z" fill="url(#redG)"/>

  <!-- Star above letters -->
  <g transform="translate(256, 125)">
    <polygon points="0,-30 7,-10 28,-10 11,4 18,24 0,13 -18,24 -11,4 -28,-10 -7,-10" fill="url(#goldG)"/>
  </g>

  <!-- G letter -->
  <g transform="translate(130, 300)">
    <!-- G outer shape -->
    <path d="M95,0 C145,0 170,20 170,20 L155,55 C155,55 135,40 100,40 C55,40 30,70 30,105 C30,140 55,170 100,170 C125,170 140,160 140,160 L140,125 L100,125 L100,90 L175,90 L175,180 C175,180 145,205 95,205 C35,205 -5,160 -5,105 C-5,45 35,0 95,0 Z" fill="url(#goldG)"/>
  </g>

  <!-- E letter -->
  <g transform="translate(305, 300)">
    <path d="M0,0 L140,0 L140,38 L38,38 L38,82 L125,82 L125,118 L38,118 L38,167 L145,167 L145,205 L0,205 Z" fill="url(#goldG)"/>
  </g>

  <!-- Small star bottom -->
  <g transform="translate(256, 430)">
    <polygon points="0,-14 3.2,-4.5 13,-4.5 5.2,2 8,12 0,6.5 -8,12 -5.2,2 -13,-4.5 -3.2,-4.5" fill="#BF0A30"/>
  </g>
</svg>
